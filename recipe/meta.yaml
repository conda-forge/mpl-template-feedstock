{% set python_min = "3.11" %}
{% set name = "mpl-template" %}
{% set version = "0.7.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mpl_template-{{ version }}.tar.gz
  sha256: 30ce148144f28b3b5e23d0d119ee7962c3c01f8fc11933819bb791ea6c4b0bca

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - matplotlib-base >=2.5.0

test:
  imports:
    - mpl_template
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://austinorr.github.io/mpl-template
  summary: 'mpl-template: matplotlib report template constructor'
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - austinorr
    - ocefpaf
